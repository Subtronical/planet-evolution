// ── THREE.JS SCENE ────────────────────────────────────────────────────────────
function SpaceBackground({onSelect,onZoom}){
  const ref=useRef();
  useEffect(()=>{
    const mount=ref.current;
    let W=window.innerWidth,H=window.innerHeight;

    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.autoClear=false;
    mount.appendChild(renderer.domElement);

    // ── BACKGROUND SCENE — pure skybox, camera only rotates, never moves ──
    const bgScene=new THREE.Scene();
    const bgCam=new THREE.PerspectiveCamera(55,W/H,0.1,200);

    // Load real NASA/ESA deep field imagery as an equirectangular skybox.
    // All NASA imagery is public domain (17 U.S.C. § 105).
    // We use ESA's sky survey (all-sky Milky Way + deep field) served from their CDN.
    // Fallback: painted canvas if image fails to load.
    const bgLoader=new THREE.TextureLoader();bgLoader.crossOrigin='anonymous';

    const makePaintedSky=()=>{
      const S=2048,cv=document.createElement('canvas');cv.width=S*2;cv.height=S;
      const ctx=cv.getContext('2d');
      // Pure near-black — real space is almost completely dark
      ctx.fillStyle='#000003';ctx.fillRect(0,0,S*2,S);

      // Faint dim star field — most stars very faint, only a few bright
      for(let i=0;i<32000;i++){
        const x=Math.random()*S*2,y=Math.random()*S;
        const r=Math.random();
        // Real sky: 95% of stars are too faint to see easily
        const bright=Math.pow(Math.random(),.5)*(r<.03?.85:r<.12?.45:.18);
        let col;
        if(r<.30)col=`rgba(255,230,200,${bright})`;   // warm white
        else if(r<.55)col=`rgba(245,245,255,${bright})`; // neutral white
        else if(r<.78)col=`rgba(200,220,255,${bright})`; // blue-white
        else if(r<.92)col=`rgba(255,200,150,${bright})`; // orange giant
        else col=`rgba(255,160,100,${bright})`;           // red giant
        ctx.fillStyle=col;
        // Only rare stars get 2px — rest are 1px
        const sz=r<.008?2:1;
        ctx.fillRect(x,y,sz,sz);
      }

      // Milky Way band — tilted ~60° across the sky, rich and detailed
      // Paint multiple overlapping passes for depth
      const paintBand=(cx,cy,w,col,alpha)=>{
        const g=ctx.createRadialGradient(cx,cy,0,cx,cy,w);
        g.addColorStop(0,col.replace('A',alpha+''));
        g.addColorStop(.5,col.replace('A',(.4*alpha)+''));
        g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=g;ctx.fillRect(0,0,S*2,S);
      };

      // Main band — runs diagonally (equirectangular galactic plane)
      ctx.save();
      ctx.translate(S,S/2);ctx.rotate(-.28);ctx.translate(-S,-S/2);

      // Outer haze — real Milky Way is subtle, not overwhelming
      const haze=ctx.createLinearGradient(0,S*.15,0,S*.85);
      haze.addColorStop(0,'rgba(0,0,0,0)');
      haze.addColorStop(.28,'rgba(14,9,4,.32)');
      haze.addColorStop(.40,'rgba(36,24,8,.48)');
      haze.addColorStop(.50,'rgba(58,40,12,.58)');
      haze.addColorStop(.60,'rgba(36,24,8,.48)');
      haze.addColorStop(.72,'rgba(14,9,4,.32)');
      haze.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=haze;ctx.fillRect(0,0,S*2,S);

      // Second warm layer — thin
      const haze2=ctx.createLinearGradient(0,S*.35,0,S*.65);
      haze2.addColorStop(0,'rgba(0,0,0,0)');
      haze2.addColorStop(.3,'rgba(45,30,10,.28)');
      haze2.addColorStop(.5,'rgba(78,52,14,.38)');
      haze2.addColorStop(.7,'rgba(45,30,10,.28)');
      haze2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=haze2;ctx.fillRect(0,0,S*2,S);

      // Galactic centre — bright but not garish
      const coreG=ctx.createRadialGradient(S*.5,S*.5,0,S*.5,S*.5,S*.18);
      coreG.addColorStop(0,'rgba(255,215,110,.88)');
      coreG.addColorStop(.10,'rgba(240,175,55,.72)');
      coreG.addColorStop(.22,'rgba(200,130,30,.50)');
      coreG.addColorStop(.42,'rgba(120,72,12,.22)');
      coreG.addColorStop(.65,'rgba(55,30,5,.08)');
      coreG.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=coreG;ctx.fillRect(0,0,S*2,S);

      // Core stellar bulge — tight bright point
      const bulge=ctx.createRadialGradient(S*.5,S*.49,0,S*.5,S*.49,S*.07);
      bulge.addColorStop(0,'rgba(255,250,210,.65)');
      bulge.addColorStop(.35,'rgba(255,200,80,.30)');
      bulge.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=bulge;ctx.fillRect(0,0,S*2,S);

      // Blue star-forming OB regions — very subtle
      const regions=[
        [S*.25,S*.42,S*.07,'rgba(70,105,200,.10)'],
        [S*.72,S*.55,S*.05,'rgba(85,120,225,.08)'],
        [S*.15,S*.52,S*.04,'rgba(60,90,185,.07)'],
        [S*.85,S*.45,S*.06,'rgba(75,105,200,.09)'],
        [S*.42,S*.38,S*.05,'rgba(90,65,195,.07)'],
      ];
      regions.forEach(([rx,ry,rr,rc])=>{
        const rg=ctx.createRadialGradient(rx,ry,0,rx,ry,rr);
        rg.addColorStop(0,rc);rg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=rg;ctx.fillRect(0,0,S*2,S);
      });

      // Faint Hα emission — barely visible
      [[S*.30,S*.44,S*.03,'rgba(155,40,40,.07)'],[S*.68,S*.52,S*.025,'rgba(140,35,35,.06)'],
       [S*.18,S*.48,S*.02,'rgba(170,50,50,.05)'],[S*.80,S*.47,S*.035,'rgba(145,38,38,.06)']
      ].forEach(([rx,ry,rr,rc])=>{
        const rg=ctx.createRadialGradient(rx,ry,0,rx,ry,rr);
        rg.addColorStop(0,rc);rg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=rg;ctx.fillRect(0,0,S*2,S);
      });

      // Dark dust lane — the rift running through the centre
      ctx.globalCompositeOperation='multiply';
      const dust=ctx.createLinearGradient(0,S*.455,0,S*.545);
      dust.addColorStop(0,'rgba(255,255,255,1)');
      dust.addColorStop(.28,'rgba(6,4,2,.88)');
      dust.addColorStop(.5,'rgba(3,2,1,.96)');
      dust.addColorStop(.72,'rgba(6,4,2,.88)');
      dust.addColorStop(1,'rgba(255,255,255,1)');
      ctx.fillStyle=dust;ctx.fillRect(S*.15,0,S*1.4,S);
      ctx.globalCompositeOperation='source-over';

      // Dense star layer along band — dimmer than before
      for(let i=0;i<9000;i++){
        const x=Math.random()*S*2;
        const y=S*.5+(Math.random()-.5)*S*.20*(1+Math.random()*.4);
        const bright=Math.pow(Math.random(),.6)*.45+.08;
        const r=Math.random();
        const col=r<.55?`rgba(255,228,175,${bright})`:`rgba(195,208,255,${bright})`;
        ctx.fillStyle=col;ctx.fillRect(x,y,1,1);
      }
      ctx.restore();

      // Subtle nebula regions — dark, natural, no neon
      const nebulae=[
        {x:S*.1, y:S*.3, r:S*.04, c0:'rgba(180,80,30,.08)',  c1:'rgba(140,50,10,.03)'},
        {x:S*.9, y:S*.65,r:S*.035,c0:'rgba(30,80,160,.07)',  c1:'rgba(15,50,120,.02)'},
        {x:S*.3, y:S*.2, r:S*.03, c0:'rgba(100,60,180,.06)', c1:'rgba(60,30,120,.02)'},
        {x:S*.7, y:S*.75,r:S*.045,c0:'rgba(200,100,20,.07)', c1:'rgba(150,60,8,.02)'},
        {x:S*.55,y:S*.15,r:S*.025,c0:'rgba(40,160,120,.05)', c1:'rgba(20,100,70,.02)'},
        {x:S*.18,y:S*.72,r:S*.04, c0:'rgba(160,70,20,.07)',  c1:'rgba(100,40,8,.02)'},
      ];
      nebulae.forEach(n=>{
        const ng=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*S);

      // ── SUN INTERIOR (t=0–7) ──────────────────────────────────────────────
      if(ct<7){

      // ── LIGHT JOURNEY (t=7–15) ────────────────────────────────────────────
      if(ct>=7&&ct<15){

      // ── EARTH ZOOM (t=15–26) ──────────────────────────────────────────────

      // ── KUIPER BELT diagram (t=31–40) ─────────────────────────────────────
      if(ct>=31&&ct<40){

      // ── HELIOSPHERE (t=36–44) ─────────────────────────────────────────────

      // ── OORT CLOUD (t=40–52) — BOLD, dramatic ─────────────────────────────
      // Stays visible through t=52 to overlap with galaxy fade-in
      if(ct>=40&&ct<52){

      // Bold "LEAVING THE SOLAR SYSTEM" card that fades in as Oort fades out

          ovCtx.font=`400 ${Math.round(H2*.016)}px 'EB Garamond',Georgia,serif`;
          ovCtx.fillStyle=`rgba(150,200,240,${a*.60})`;
          ovCtx.fillText('Entering interstellar space · 4.2 light years to the nearest star',W2*.5,H2*.52);
          ovCtx.font=`300 ${Math.round(H2*.013)}px Cinzel,Georgia,serif`;
          ovCtx.fillStyle=`rgba(100,160,210,${a*.40})`;

        }
      }

      // ── MILKY WAY GALAXY IMAGE (t=52–115) ────────────────────────────────
      // Real NASA artist concept — slow drift + YOU ARE HERE
      if(ct>=52&&ct<=115){
        const phase=ct-52; // 0 → 63
        const masterA=phase<3?phase/3:phase>60?(63-phase)/3:1;

            // Label — always visible while galaxy is shown

          }

            ovCtx.textAlign='center';ovCtx.textBaseline='bottom';
            ovCtx.font=`400 ${Math.round(H2*.0095)}px 'EB Garamond',Georgia,serif`;
            ovCtx.fillStyle=`rgba(255,255,255,.65)`;
            ovCtx.fillText('50,000 light years',bx+barW*.5,by-5);
            ovCtx.restore();
          }

          // Titles
          const titleA=Math.min(1,phase/4)*masterA;
          if(phase<20){
            title('The Milky Way','Our galaxy — artist concept · we cannot photograph it from outside — we are inside it','#aaddff',titleA);
          } else if(phase<40){
            title('Our Galaxy','100,000 light years across · 200–400 billion stars · 4 spiral arms','#aaddff',titleA);

          }
        }
      }

      // ── PROGRESS BAR ─────────────────────────────────────────────────────
      if(cinemaLabelAlpha>.01&&ct<47){
        const a=cinemaLabelAlpha;
        const [rr,gg,bb]=parseHex(cinemaColor);
        const bw=W2*.55,bx=W2*.225,by=barH*.74,bh=1.5;
        ovCtx.fillStyle=`rgba(255,255,255,${a*.12})`;ovCtx.fillRect(bx,by,bw,bh);
        ovCtx.fillStyle=`rgba(${rr},${gg},${bb},${a*.62})`;
        ovCtx.fillRect(bx,by,bw*Math.min(cinemaTime/JOURNEY_DUR,1),bh);
      }
      // Progress bar during galaxy phase
      if(ct>=47){
        const prog=Math.min(1,ct/JOURNEY_DUR);
        const bw=W2*.55,bx=W2*.225,by=barH*.74,bh=1.5;
        ovCtx.fillStyle='rgba(255,255,255,.08)';ovCtx.fillRect(bx,by,bw,bh);

      }
    };

    const initAudio=()=>{
      if(audioCtx&&musicMaster)return musicMaster; // already initialised
      if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      const master=audioCtx.createGain();
      master.gain.setValueAtTime(0,audioCtx.currentTime);
      master.connect(audioCtx.destination);

      // Deep space reverb (6.5s decay)
      const mkRev=(wet,dec)=>{
        const cv=audioCtx.createConvolver();
        const len=Math.floor(audioCtx.sampleRate*dec);
        const buf=audioCtx.createBuffer(2,len,audioCtx.sampleRate);
        for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.4);}
        cv.buffer=buf;
        const wg=audioCtx.createGain();wg.gain.value=wet;cv.connect(wg);wg.connect(master);
        const dg=audioCtx.createGain();dg.gain.value=Math.max(0,1-wet*.6);dg.connect(master);
        return{i:cv};
      };
      const rv1=mkRev(.72,6.5);
      const rv2=mkRev(.38,2.0);

      // Dark warm filter on everything
      const dark=audioCtx.createBiquadFilter();
      dark.type='lowpass';dark.frequency.value=4200;dark.Q.value=.4;
      dark.connect(rv1.i);dark.connect(rv2.i);
      const hp=audioCtx.createBiquadFilter();
      hp.type='highpass';hp.frequency.value=28;hp.Q.value=.4;
      hp.connect(dark);

      const reg=n=>{musicNodes.push(n);return n;};

      // E Phrygian scale — the "forbidden" dark mode used by Flamenco, metal, horror
      // E2=82.4  F2=87.3  G2=98.0  A2=110  B2=123.5  C3=130.8  D3=146.8
      // E3=164.8 F3=174.6 G3=196   A3=220  B3=246.9  C4=261.6  D4=293.7
      // E4=329.6 F4=349.2 G4=392   A4=440  B4=493.9

      // ── INSTRUMENTS ─────────────────────────────────────────────────────

      // Moog-style synth — square+saw+sub with resonant filter sweep
      const moog=(freq,vol,start,dur,pan=0,fHz=700)=>{
        const o1=reg(audioCtx.createOscillator());o1.type='square';o1.frequency.value=freq;
        const o2=reg(audioCtx.createOscillator());o2.type='sawtooth';o2.frequency.value=freq*1.0035;
        const sub=reg(audioCtx.createOscillator());sub.type='sine';sub.frequency.value=freq*.5;
        const flt=audioCtx.createBiquadFilter();flt.type='lowpass';flt.Q.value=5.5;
        flt.frequency.setValueAtTime(60,start);
        flt.frequency.linearRampToValueAtTime(fHz,start+.06);
        flt.frequency.exponentialRampToValueAtTime(fHz*.3+50,start+dur*.75);
        const g=audioCtx.createGain();g.gain.setValueAtTime(0,start);
        g.gain.linearRampToValueAtTime(vol,start+.035);
        g.gain.setValueAtTime(vol*.88,start+dur*.65);
        g.gain.linearRampToValueAtTime(0,start+dur);
        const p=audioCtx.createStereoPanner();p.pan.value=pan;
        [o1,o2].forEach(o=>{const vg=audioCtx.createGain();vg.gain.value=.38;o.connect(vg);vg.connect(flt);});
        const sg=audioCtx.createGain();sg.gain.value=.32;sub.connect(sg);sg.connect(flt);
        flt.connect(g);g.connect(p);p.connect(hp);
        [o1,o2,sub].forEach(o=>{o.start(start);o.stop(start+dur+.05);});
      };

      // E-bow drone — very slow attack, shimmer, thick
      const ebow=(freq,vol,start,dur,pan=0)=>{
        [0,-7,7,-14,12,19].forEach((cents,i)=>{
          const o=reg(audioCtx.createOscillator());
          o.type='sine';o.frequency.value=freq*Math.pow(2,cents/1200);
          const lfo=reg(audioCtx.createOscillator());lfo.type='sine';lfo.frequency.value=.12+i*.04;
          const lfoG=audioCtx.createGain();lfoG.gain.value=vol*.04;lfo.connect(lfoG);
          const g=audioCtx.createGain();
          const v=vol/(1+i*.18)*.55;
          g.gain.setValueAtTime(0,start);
          g.gain.linearRampToValueAtTime(v,start+4);
          g.gain.setValueAtTime(v,start+dur-3.5);
          g.gain.linearRampToValueAtTime(0,start+dur);
          lfoG.connect(g.gain);
          const p=audioCtx.createStereoPanner();p.pan.value=pan+(i%2===0?.45:-.45);
          o.connect(g);g.connect(p);p.connect(hp);
          lfo.start(start);lfo.stop(start+dur+.1);
          o.start(start);o.stop(start+dur+.1);
        });
      };

      // ST-style arpeggio — fast repeating notes, the signature sound
      const arp=(freqs,start,dur,noteLen,vol,pan=0)=>{
        const n=Math.ceil(dur/noteLen);
        for(let i=0;i<n;i++){
          const freq=freqs[i%freqs.length];
          const st=start+i*noteLen;
          const o=reg(audioCtx.createOscillator());o.type='square';o.frequency.value=freq;
          const flt=audioCtx.createBiquadFilter();flt.type='lowpass';flt.frequency.value=freq*2.5;flt.Q.value=4;
          const g=audioCtx.createGain();
          g.gain.setValueAtTime(0,st);
          g.gain.linearRampToValueAtTime(vol,st+.012);
          g.gain.exponentialRampToValueAtTime(.001,st+noteLen*.78);
          const p=audioCtx.createStereoPanner();p.pan.value=pan;
          o.connect(flt);flt.connect(g);g.connect(p);p.connect(hp);
          o.start(st);o.stop(st+noteLen+.02);
        }
      };

      // Clock tick — percussive short pulse for the heartbeat rhythm
      const tick=(start,dur,freq,vol,pat=[1,0,1,0,1,0,1,1])=>{
        const bps=118/60;
        const total=Math.ceil(dur*bps);
        for(let i=0;i<total;i++){
          if(!pat[i%pat.length])continue;
          const st=start+i/bps;
          const o=reg(audioCtx.createOscillator());o.type='square';o.frequency.value=freq;
          const flt=audioCtx.createBiquadFilter();flt.type='bandpass';flt.frequency.value=freq*2.8;flt.Q.value=6;
          const g=audioCtx.createGain();
          g.gain.setValueAtTime(vol,st);g.gain.exponentialRampToValueAtTime(.001,st+.28);
          o.connect(flt);flt.connect(g);g.connect(hp);

      };

      // Sub bass pedal — dark rumble
      const bass=(freq,vol,start,dur)=>{
        const o=reg(audioCtx.createOscillator());o.type='sawtooth';o.frequency.value=freq;
        const flt=audioCtx.createBiquadFilter();flt.type='lowpass';flt.frequency.value=160;flt.Q.value=1.5;
        const g=audioCtx.createGain();g.gain.setValueAtTime(0,start);

        g.gain.linearRampToValueAtTime(0,start+dur);
        o.connect(flt);flt.connect(g);g.connect(hp);

      const A2=[82.4,98,110,123.5,110,98,82.4,65.4];       // octave below
      const A3=[164.8,196,246.9,196,329.6,246.9,196,164.8]; // wider leap
      const A4=[329.6,392,440,392,329.6,293.7,246.9,329.6]; // high register
      const A5=[164.8,174.6,196,174.6,164.8,154.0,146.8,164.8]; // chromatic — creepy

      // ── ACT I: SUN CORE (0–7s) — single nuclear heartbeat ───────────────

      // ── ACT II: LIGHT JOURNEY (7–21s) — arp awakens, clock starts ───────

      // Moog stabs — call and response

       [164.8,33,.3],[130.8,37,-.2],[146.8,41,.2],[164.8,45,-.3],[196,49,.3]].forEach(([f,dt,p])=>{
        moog(f,.038,T+dt,BT*1.8,p,900);
      });

      // ── ACT IV: ORION ARM (55–72s) — CLIMAX, all layers, full power ──────
      ebow(41.2,.18,T+55,17,-.25);
      ebow(82.4,.14,T+55,17, .25);
      ebow(164.8,.09,T+57,15, 0);
      ebow(246.9,.06,T+59,13,-.15);
      bass(41.2,.14,T+55,17);
      bass(82.4,.08,T+55,17);
      arp(A1,T+55,17,BT*.25,.052,-.3); // 16th notes — double speed!
      arp(A4,T+55,17,BT*.25,.040, .3);
      arp(A3,T+57,15,BT*.5,.032,  0);
      tick(T+55,17,82.4,.060,[1,0,1,1,1,0,1,1]);
      tick(T+55,17,164.8,.034,[0,1,0,0,0,1,0,1]);

      bassWalk([[41.2,1],[43.7,1],[45.0,1],[46.2,1],[41.2,1],[38.9,1],[37.0,1],[41.2,1]],T+55,BT,.12);
      // Moog lead melody over the top — E Phrygian scale ascending
      [[164.8,55,-.1,1200],[196,56.5,.1,1000],[220,58,-.1,1100],[246.9,59.5,.1,1300],
       [293.7,61,0,1400],[246.9,63,-.1,1100],[220,64.5,.1,1000],[196,66,0,900],[220,68,-.1,1100]].forEach(([f,dt,p,fz])=>{
        moog(f,.068,T+dt,BT*1.7,p,fz);
      });

      // ── ACT V: MILKY WAY (72–114s) — MAXIMUM INTENSITY ──────────────────
      ebow(41.2,.22,T+72,42,-.2);
      ebow(82.4,.17,T+72,42, .2);
      ebow(164.8,.11,T+72,42, 0);
      ebow(329.6,.06,T+76,38,-.1);
      bass(41.2,.16,T+72,42);
      bass(82.4,.10,T+72,42);
      arp(A1,T+72,42,BT*.25,.055,-.3);
      arp(A4,T+72,42,BT*.25,.042, .3);
      arp(A3,T+74,40,BT*.5,.038,  0);
      arp(A5,T+78,36,BT*.5,.025,-.15);
      tick(T+72,42,82.4,.065,[1,0,1,1,1,0,1,1]);
      tick(T+72,42,164.8,.038,[0,1,0,0,0,1,0,1]);
      tick(T+72,42,41.2,.060,[1,0,0,0,1,0,0,0]);
      bassWalk([[41.2,1],[40.0,1],[38.9,1],[37.0,1],[38.9,2],[40.0,1],[41.2,1],[43.7,2]],T+72,BT,.14);
      // Moog lead — longer phrases, more melodic
      [[329.6,72,0,1600],[392,73.5,-.1,1400],[440,75,.1,1500],[392,76.5,0,1300],
       [329.6,78,-.1,1200],[293.7,80,.1,1100],[246.9,82,0,1000],[293.7,84,-.1,1100],
       [329.6,86,.1,1200],[392,88,0,1400],[329.6,90,-.1,1200],[246.9,92,.1,1000],
       [220,94,0,900],[246.9,96,-.1,1000],[293.7,98,.1,1100],[329.6,100,0,1200]].forEach(([f,dt,p,fz])=>{
        moog(f,.072,T+dt,BT*1.6,p,fz);
        moog(f*.5,.040,T+dt,BT*1.6,-p,fz*.4);
      });

      // ── ACT VI: VOID → LMC → SMC (114–162s) — pull back, wonder ─────────
      ebow(41.2,.14,T+114,28,-.2);
      ebow(82.4,.09,T+114,28, .2);
      ebow(123.5,.05,T+118,24, 0);
      bass(41.2,.08,T+114,28);
      arp(A1,T+114,28,BT*.5,.030,-.2);
      tick(T+114,28,82.4,.030,[1,0,0,1,0,0,1,0]); // sparse — wonder
      bassWalk([[41.2,4],[38.9,2],[41.2,2]],T+114,BT,.06);
      [[164.8,114,-.1,700],[196,118,.1,750],[164.8,122,0,700],[130.8,126,-.1,650],[146.8,130,.1,700]].forEach(([f,dt,p,fz])=>{
        moog(f,.040,T+dt,BT*2.5,p,fz);
      });
      // LMC/SMC — lifts to warmer tone, hope
      ebow(55.0,.11,T+140,22,-.2);
      ebow(110.0,.07,T+140,22, .2);
      bass(55.0,.07,T+140,22);
      arp([196,220,246.9,220],T+140,22,BT*.5,.026,0);
      tick(T+140,22,82.4,.026,[1,0,1,0,0,1,0,0]);
      [[196,140,-.1,800],[220,143,.1,850],[246.9,146,0,900],[220,150,-.1,800]].forEach(([f,dt,p,fz])=>{
        moog(f,.038,T+dt,BT*2,p,fz);
      });

      // ── ACT VII: ANDROMEDA (162–180s) — final statement ──────────────────
      ebow(41.2,.18,T+162,18,-.2);
      ebow(82.4,.14,T+162,18, .2);
      ebow(164.8,.09,T+164,16, 0);
      bass(41.2,.12,T+162,18);
      arp(A4,T+162,18,BT*.25,.050,-.3);
      arp(A1,T+162,18,BT*.25,.038, .3);
      tick(T+162,18,82.4,.055,[1,0,1,1,1,0,1,1]);
      tick(T+162,18,41.2,.050,[1,0,0,0,1,0,0,0]);
      bassWalk([[41.2,2],[43.7,1],[41.2,1],[38.9,2],[37.0,1],[38.9,1]],T+162,BT,.10);
      // Final moog theme — all the way down in register, resigned and vast
      [[164.8,162,0,900],[196,164,-.1,950],[220,166,.1,1000],[246.9,168,0,1050],
       [220,170,-.1,950],[196,172,.1,900],[164.8,174,0,850],[130.8,176,-.1,800]].forEach(([f,dt,p,fz])=>{
        moog(f,.062,T+dt,BT*2.2,p,fz);
      });
      // Fade — just drones remain
      ebow(41.2,.04,T+175,5,0);

      // ── MASTER ENVELOPE — synced to 115s journey ─────────────────────────
      master.gain.setValueAtTime(0,T);
      master.gain.linearRampToValueAtTime(.32,T+1.5);
      master.gain.linearRampToValueAtTime(.44,T+7);
      master.gain.linearRampToValueAtTime(.52,T+26);

      master.gain.linearRampToValueAtTime(.80,T+65);

      master.gain.linearRampToValueAtTime(.45,T+100);
      master.gain.linearRampToValueAtTime(.15,T+110);
      master.gain.linearRampToValueAtTime(0,  T+115);

      musicVolume=1;
      return master;
    };

    // Vertical letterbox for reels (9:16 black side bars on landscape screens)
    const reelsOverlay=document.createElement('canvas');
    reelsOverlay.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:49;width:100%;height:100%;';
    reelsOverlay.width=W;reelsOverlay.height=H;
    mount.parentElement.appendChild(reelsOverlay);
    const roCtx=reelsOverlay.getContext('2d');
    let reelsSideBarW=0;

    const drawReelsBars=()=>{
      roCtx.clearRect(0,0,reelsOverlay.width,reelsOverlay.height);
      if(!reelsActive)return;
      // On landscape screens draw 9:16 crop bars
      const RW=reelsOverlay.width,RH=reelsOverlay.height;
      const targetW=RH*(9/16);
      reelsSideBarW=Math.max(0,(RW-targetW)/2);
      if(reelsSideBarW>4){
        roCtx.fillStyle='rgba(0,0,0,.96)';
        roCtx.fillRect(0,0,reelsSideBarW,RH);
        roCtx.fillRect(RW-reelsSideBarW,0,reelsSideBarW,RH);
      }
      // Instagram @handle watermark bottom-left
      if(reelsSideBarW>0){
        roCtx.font=`400 ${Math.round(RH*.018)}px Cinzel,serif`;
        roCtx.fillStyle='rgba(255,255,255,.35)';
        roCtx.textAlign='left';roCtx.textBaseline='bottom';
        roCtx.fillText('✦ COSMIC FEDERATION',reelsSideBarW+RH*.04,RH*.93);
      }
    };

    // Reels button
    const reelsBtn=document.createElement('button');
    reelsBtn.innerHTML='📱  REELS  CUT  <span style="background:linear-gradient(90deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);border-radius:4px;padding:1px 5px;font-size:8px;color:white;letter-spacing:1px;vertical-align:middle">60s</span>';
    reelsBtn.style.cssText='position:fixed;bottom:24px;right:220px;z-index:300;background:rgba(0,0,0,.80);border:1px solid rgba(255,100,100,.25);border-radius:28px;color:rgba(255,255,255,.80);font-family:Cinzel,serif;font-size:10px;letter-spacing:2px;padding:10px 18px;cursor:pointer;backdrop-filter:blur(16px);transition:background .2s;display:flex;align-items:center;gap:8px;';
    mount.parentElement.appendChild(reelsBtn);

    const startReels=()=>{
      reelsActive=true;cinemaActive=true;cinemaTime=0;
      cinWaypoints=REELS_WAYPOINTS;cinDur=REELS_DUR;
      cinStart={r:cur.r,t:cur.t,p:cur.p};
      const wp0=REELS_WAYPOINTS[0];
      cinemaLabel=wp0.lbl;cinemaSub=wp0.sub||'';cinemaLabelAlpha=0;cinemaColor=wp0.colr||'#ffffff';
      reelsBtn.innerHTML='■  STOP  REELS';reelsBtn.style.background='rgba(180,20,80,.78)';
      cinBtn.style.opacity='.35';cinBtn.style.pointerEvents='none';
      startMusic();muteBtn.style.color='rgba(255,255,255,.85)';
    };
    const stopReels=()=>{
      reelsActive=false;cinemaActive=false;
      cinWaypoints=WAYPOINTS;cinDur=JOURNEY_DUR;
      tgt.r=cur.r;tgt.t=cur.t;tgt.p=cur.p;
      reelsBtn.innerHTML='📱  REELS  CUT  <span style="background:linear-gradient(90deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);border-radius:4px;padding:1px 5px;font-size:8px;color:white;letter-spacing:1px;vertical-align:middle">60s</span>';
      reelsBtn.style.background='rgba(0,0,0,.80)';
      cinBtn.style.opacity='1';cinBtn.style.pointerEvents='auto';
      roCtx.clearRect(0,0,reelsOverlay.width,reelsOverlay.height);
      stopMusic();muteBtn.style.color='rgba(255,255,255,.55)';
    };
    reelsBtn.addEventListener('click',()=>reelsActive?stopReels():startReels());

    // When cinema stop is triggered, also handle reels + music
    const stopCinemaFull=()=>{
      if(reelsActive)stopReels();
      else{stopCinema();stopMusic();muteBtn.style.color='rgba(255,255,255,.55)';}
    };
    // Override cinBtn to use full stop
    cinBtn.onclick=()=>cinemaActive?stopCinemaFull():startCinemaWithMusic();
    let rafId,lastMs=performance.now();
    const animate=()=>{
      rafId=requestAnimationFrame(animate);
      const now=performance.now(),dt=Math.min((now-lastMs)/1000,.05);lastMs=now;

      // Planet self-rotation (always on)
      sun.rotation.y+=.004*dt*60;
      PMeshes.forEach(({mesh,pivot,p,moons})=>{
        pivot.rotation.y+=p.spd*dt*60;
        mesh.rotation.y+=(p.rot||.002)*dt*60;
        moons.forEach(({pivot:mp,m})=>{mp.rotation.y+=m.spd*dt*60;});
      });

      if(cinemaActive){
        cinemaTime+=dt;
        if(cinemaTime>=cinDur){reelsActive?stopReels():stopCinema();}
        else{
          const wp=cinWaypoints.find(w=>cinemaTime>=w.t0&&cinemaTime<w.t1)||cinWaypoints[cinWaypoints.length-1];
          const wpProg=(cinemaTime-wp.t0)/Math.max(wp.t1-wp.t0,.001);
          const e=ease(Math.max(0,Math.min(1,wpProg)));
          const logR=Math.log(wp.r0)+(Math.log(wp.r1)-Math.log(wp.r0))*e;
          cur.r=Math.exp(logR);
          cur.t+=(wp.az-cur.t)*Math.min(1,dt*1.2);
          cur.p+=(wp.el-cur.p)*Math.min(1,dt*1.2);
          if(wpProg<.18)cinemaLabelAlpha=wpProg/.18;
          else if(wpProg>.78)cinemaLabelAlpha=1-(wpProg-.78)/.22;
          else cinemaLabelAlpha=1;
          cinemaLabel=wp.lbl;cinemaSub=wp.sub||'';cinemaColor=wp.colr||'#ffffff';
        }
      } else {
        const s=1-Math.pow(.018,dt);
        cur.t+=(tgt.t-cur.t)*s;cur.p+=(tgt.p-cur.p)*s;cur.r+=(tgt.r-cur.r)*s;
        cinemaLabelAlpha=Math.max(0,cinemaLabelAlpha-dt*1.8);
      }

      // Fade extragalactic sprites in/out based on camera distance
      fadingSprites.forEach(([sp,r0,r1])=>{
        const f=Math.max(0,Math.min(1,(cur.r-r0)/(r1-r0)));
        sp.material.opacity=f*sp.userData.maxOp;
      });

      updCam();
      drawOverlay();
      drawReelsBars();
      // Two-pass: clear, draw bg stars+galaxy (bgCam = orientation only, no translation)
      renderer.clear();
      bgCam.quaternion.copy(cam.quaternion);
      renderer.render(bgScene,bgCam);
      renderer.clearDepth();
      renderer.render(scene,cam);
    };animate();

    const onResize=()=>{
      W=window.innerWidth;H=window.innerHeight;
      cam.aspect=W/H;cam.updateProjectionMatrix();
      bgCam.aspect=W/H;bgCam.updateProjectionMatrix();
      renderer.setSize(W,H);
      ovCv.width=W;ovCv.height=H;
      reelsOverlay.width=W;reelsOverlay.height=H;
    };
    window.addEventListener('resize',onResize);
    return()=>{
      cancelAnimationFrame(rafId);
      window.removeEventListener('resize',onResize);
      stopMusic();
      if(mount.contains(renderer.domElement))mount.removeChild(renderer.domElement);
      if(ovCv.parentElement)ovCv.parentElement.removeChild(ovCv);
      if(reelsOverlay.parentElement)reelsOverlay.parentElement.removeChild(reelsOverlay);
      if(cinBtn.parentElement)cinBtn.parentElement.removeChild(cinBtn);
      if(reelsBtn.parentElement)reelsBtn.parentElement.removeChild(reelsBtn);
      if(muteBtn.parentElement)muteBtn.parentElement.removeChild(muteBtn);
      renderer.dispose();
    };
  },[]);
  return h('div',{ref,style:{position:'fixed',inset:0,cursor:'grab'}});
}

// DISTANCE PANEL  (right sidebar)
// ─────────────────────────────────────────────────────────────────────────────
function DistancePanel({metric,setMetric,onClose}){
  const fmtKm=km=>{
    if(km>=1e9)return(km/1e9).toFixed(2)+' billion km';
    if(km>=1e6)return(km/1e6).toFixed(1)+' million km';
    if(km>=1000)return(km/1000).toFixed(0)+',000 km';
    return km+' km';
  };
  const fmtMi=km=>{
    const mi=km*0.621371;
    if(mi>=1e9)return(mi/1e9).toFixed(2)+' billion mi';
    if(mi>=1e6)return(mi/1e6).toFixed(1)+' million mi';
    if(mi>=1000)return(mi/1000).toFixed(0)+',000 mi';
    return mi.toFixed(0)+' mi';
  };
  const fmtAU=au=>{
    if(au>=1000)return(au/1000).toFixed(1)+'k AU';
    if(au>=1)return au>=10?au.toFixed(0)+' AU':au.toFixed(2)+' AU';
    return au.toFixed(3)+' AU';
  };

  return h('div',{style:{position:'fixed',right:14,top:'50%',transform:'translateY(-50%)',width:290,zIndex:200,background:'linear-gradient(160deg,rgba(2,4,14,.98),rgba(4,8,28,.98))',border:'1px solid rgba(100,160,255,.25)',borderRadius:20,boxShadow:'0 0 50px rgba(80,140,255,.10),0 30px 80px rgba(0,0,0,.95)',backdropFilter:'blur(24px)',display:'flex',flexDirection:'column',maxHeight:'88vh',overflow:'hidden',animation:'slideIn .3s ease'}},
    // Header
    h('div',{style:{padding:'14px 16px 10px',background:'radial-gradient(ellipse at 50% 0,rgba(80,140,255,.12),transparent 70%)',borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0}},
      h('button',{onClick:onClose,style:{position:'absolute',top:10,right:12,width:26,height:26,borderRadius:'50%',background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.10)',color:'white',fontSize:12,cursor:'pointer'}},'✕'),
      h('div',{style:{textAlign:'center'}},
        h('div',{style:{fontSize:22,marginBottom:4}},'📏'),
        h('div',{style:{color:'#88aaff',fontSize:8,letterSpacing:3,fontFamily:"'Cinzel',serif",marginBottom:2}},'DISTANCE FROM THE SUN'),
        h('div',{style:{color:'rgba(255,255,255,.35)',fontSize:9,fontFamily:"'Cinzel',serif"}},'Average orbital distance · light travel time')),
      // Unit toggle
      h('div',{style:{display:'flex',justifyContent:'center',marginTop:10}},
        h('div',{style:{display:'flex',background:'rgba(0,0,0,.6)',borderRadius:20,border:'1px solid rgba(255,255,255,.10)',overflow:'hidden'}},
          ['KM','MI','AU'].map(u=>h('button',{key:u,
            onClick:()=>{if(u==='KM')setMetric('km');else if(u==='MI')setMetric('mi');else setMetric('au');},
            style:{padding:'4px 14px',fontSize:9,fontFamily:"'Cinzel',serif",fontWeight:700,border:'none',cursor:'pointer',
              background:metric===u.toLowerCase()||metric===u?'rgba(100,140,255,.28)':'transparent',
              color:metric===u.toLowerCase()||metric===u?'white':'rgba(255,255,255,.30)',
              transition:'all .2s'}},u))))),
    // Distances list
    h('div',{style:{flex:1,overflowY:'auto',padding:'8px 10px 12px'}},
      DISTANCES.map((d,i)=>{
        const isAU=metric==='au'||metric==='AU';
        const isMi=metric==='mi'||metric==='MI';
        const distStr=isAU?fmtAU(d.auRaw):isMi?fmtMi(d.kmM):fmtKm(d.kmM);
        const lightMin=d.kmM/299.792;
        const lightStr=lightMin<1?(lightMin*60).toFixed(1)+' sec':
          lightMin<60?lightMin.toFixed(1)+' min':
          lightMin<1440?(lightMin/60).toFixed(1)+' hrs':
          lightMin<525600?(lightMin/1440).toFixed(1)+' days':
          (lightMin/525600).toFixed(2)+' yrs';
        const auStr=fmtAU(d.auRaw);
        return h('div',{key:d.name,style:{display:'flex',alignItems:'center',gap:8,padding:'7px 8px',borderRadius:10,marginBottom:2,background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.04)',transition:'background .15s'}},
          h('div',{style:{width:8,height:8,borderRadius:'50%',background:d.color,flexShrink:0,boxShadow:'0 0 6px '+d.color+'60'}}),
          h('div',{style:{flex:1,minWidth:0}},
            h('div',{style:{display:'flex',alignItems:'baseline',gap:5}},
              h('span',{style:{color:'white',fontSize:11,fontFamily:"'Cinzel',serif",fontWeight:500}},d.name),
              d.note&&h('span',{style:{color:'rgba(255,255,255,.30)',fontSize:8.5}},d.note)),
            h('div',{style:{color:'rgba(255,255,255,.30)',fontSize:9,marginTop:1}},
              '☀ ',lightStr,' at light speed',
              !isAU&&' · '+auStr)),
          h('div',{style:{textAlign:'right',flexShrink:0}},
            h('div',{style:{color:d.color,fontSize:10.5,fontFamily:"'Cinzel',serif",fontWeight:600,whiteSpace:'nowrap'}},distStr)));
      })
    ),
    h('div',{style:{padding:'6px 14px 8px',borderTop:'1px solid rgba(255,255,255,.04)',color:'rgba(255,255,255,.12)',fontSize:8.5,flexShrink:0,textAlign:'center'}},'Average orbital distances · NASA JPL Horizons'));
}

  const [selTelescope,setSelTelescope]=useState(null);
  const [selMars,setSelMars]=useState(null);
  const [selMoon,setSelMoon]=useState(null);

  const handleSel=b=>setSel(p=>p&&p.name===b.name?null:b);
  const zCtx=ZOOM_CTX.find(([max])=>zoom<max)||ZOOM_CTX[ZOOM_CTX.length-1];
  const closeAll=()=>{setActiveAgency(null);setShowNext(false);};
  const toggleSection=k=>setExpSection(s=>({...s,[k]:!s[k]}));

  // Close detail panels when BodyPanel opens and vice versa
  const openTelescope=t=>{setSelTelescope(t);setSelMars(null);setSelMoon(null);setSel(null);setShowDist(false);};
  const openMars=m=>{setSelMars(m);setSelTelescope(null);setSelMoon(null);setSel(null);setShowDist(false);};
  const openMoon=m=>{setSelMoon(m);setSelMars(null);setSelTelescope(null);setSel(null);setShowDist(false);};
  const openDist=()=>{setShowDist(s=>!s);setSelTelescope(null);setSelMars(null);setSelMoon(null);setSel(null);};
  const handleBodySel=b=>{handleSel(b);setSelTelescope(null);setSelMars(null);setSelMoon(null);setShowDist(false);};

  // Section header helper
  const SectionHdr=(lbl,key,icon,color)=>h('div',{
    onClick:()=>toggleSection(key),
    style:{display:'flex',alignItems:'center',gap:5,padding:'3px 6px',cursor:'pointer',borderRadius:8,userSelect:'none',marginTop:4}},
    h('div',{style:{width:3,height:12,borderRadius:2,background:color||'rgba(255,255,255,.3)',flexShrink:0}}),
    h('div',{style:{color:color||'rgba(255,255,255,.22)',fontSize:7.5,letterSpacing:2,fontFamily:"'Cinzel',serif",flex:1}},lbl),
    icon&&h('span',{style:{fontSize:10}},icon),
    h('span',{style:{color:'rgba(255,255,255,.25)',fontSize:8}},expSection[key]?'▲':'▼'));

  // Mini button for left menu
  const MiniBtn=(label,color,onClick,active,status,emoji)=>h('button',{
    onClick,
    style:{display:'flex',alignItems:'center',gap:7,padding:'5px 9px',borderRadius:18,cursor:'pointer',
      fontSize:10,fontFamily:"'Cinzel',serif",
      background:active?color+'22':'rgba(0,0,0,.55)',
      border:active?'1px solid '+color+'55':'1px solid rgba(255,255,255,.06)',
      color:active?color:'rgba(255,255,255,.55)',
      backdropFilter:'blur(12px)',marginBottom:2,width:'100%',textAlign:'left',transition:'all .2s'}},
    emoji?h('span',{style:{fontSize:11,flexShrink:0}},emoji):h('div',{style:{width:6,height:6,borderRadius:'50%',background:color,flexShrink:0}}),
    h('span',{style:{flex:1}},label),
    status&&h('span',{style:{fontSize:7,color:status==='active'?'#33ee77':status==='done'?'rgba(255,255,255,.25)':'#ffaa44'}},status==='active'?'●':status==='done'?'✓':'~'));

  return h('div',{style:{minHeight:'100vh',background:'#000',overflow:'hidden'}},
    h(SpaceBackground,{onSelect:handleBodySel,onZoom:setZoom}),

    // ── TOP NAV BAR ──────────────────────────────────────────────────────────
    h('header',{style:{position:'fixed',top:0,left:0,right:0,zIndex:200,height:50,display:'flex',alignItems:'center',background:'linear-gradient(180deg,rgba(0,0,4,.96) 0%,rgba(0,0,8,.88) 100%)',borderBottom:'1px solid rgba(255,255,255,.07)',backdropFilter:'blur(20px)'}},
      h('div',{style:{padding:'0 16px',fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,letterSpacing:2.5,color:'#fff',flexShrink:0,whiteSpace:'nowrap',borderRight:'1px solid rgba(255,255,255,.08)',height:'100%',display:'flex',alignItems:'center'}},
        h('span',{style:{color:'#ffcc50',marginRight:6}},'✦'),'COSMIC FEDERATION'),
      h('div',{style:{display:'flex',alignItems:'center',gap:1,overflowX:'auto',flex:1,height:'100%',padding:'0 4px',scrollbarWidth:'none'}},
        AGENCIES.map(ag=>h('button',{key:ag.id,
          onClick:()=>{closeAll();setActiveAgency(activeAgency?.id===ag.id?null:ag);},
          style:{display:'flex',alignItems:'center',gap:5,padding:'0 12px',height:'100%',
            background:activeAgency?.id===ag.id?ag.color+'22':'transparent',
            borderBottom:activeAgency?.id===ag.id?'2px solid '+ag.color:'2px solid transparent',
            borderTop:'2px solid transparent',borderLeft:'none',borderRight:'none',
            color:activeAgency?.id===ag.id?ag.color:'rgba(255,255,255,.45)',
            fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1.5,
            cursor:'pointer',whiteSpace:'nowrap',transition:'all .18s',flexShrink:0}},
          h('span',{style:{fontSize:12}},ag.icon),ag.name)),
        h('div',{style:{width:1,background:'rgba(255,255,255,.10)',margin:'10px 4px',flexShrink:0}}),
        h('button',{onClick:()=>{closeAll();setShowNext(s=>!s);},
          style:{display:'flex',alignItems:'center',gap:6,padding:'0 16px',height:'100%',
            background:showNext?'rgba(100,200,255,.12)':'transparent',
            borderBottom:showNext?'2px solid #88ccff':'2px solid transparent',
            borderTop:'2px solid transparent',borderLeft:'none',borderRight:'none',
            color:showNext?'#aad4ff':'rgba(255,255,255,.55)',
            fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:2,
            cursor:'pointer',whiteSpace:'nowrap',transition:'all .18s',flexShrink:0}},
          h('span',{style:{fontSize:13}},'🔭'),h('span',null,'NEXT'),
          h('span',{style:{background:'rgba(100,200,255,.20)',border:'1px solid rgba(100,200,255,.35)',borderRadius:10,padding:'1px 6px',fontSize:7.5,color:'#88ccff',letterSpacing:1}},'FUNDED'))),
      h('div',{style:{padding:'0 14px',color:'rgba(255,255,255,.20)',fontSize:9,fontFamily:"'Cinzel',serif",letterSpacing:1,flexShrink:0,whiteSpace:'nowrap',borderLeft:'1px solid rgba(255,255,255,.08)'}},'LIVE UNIVERSE')),

    activeAgency&&h(AgencyPanel,{agency:activeAgency,onClose:closeAll}),
    showNext&&h(NextPanel,{onClose:closeAll}),
    (activeAgency||showNext)&&h('div',{onClick:closeAll,style:{position:'fixed',inset:0,zIndex:199}}),

    zCtx&&h('div',{key:zCtx[1],style:{position:'fixed',top:66,left:'50%',transform:'translateX(-50%)',zIndex:100,background:'rgba(0,0,0,.70)',backdropFilter:'blur(14px)',border:'1px solid '+zCtx[3]+'35',borderRadius:24,padding:'6px 20px',textAlign:'center',pointerEvents:'none',animation:'fadeIn .4s ease',whiteSpace:'nowrap'}},
      h('div',{style:{color:zCtx[3],fontSize:11,fontFamily:"'Cinzel',serif",letterSpacing:2,fontWeight:700}},zCtx[1]),
      h('div',{style:{color:'rgba(255,255,255,.38)',fontSize:10,marginTop:1}},zCtx[2])),

    // ── LEFT SIDEBAR ─────────────────────────────────────────────────────────
    h('div',{style:{position:'fixed',left:14,top:'50%',transform:'translateY(-50%)',zIndex:100,display:'flex',flexDirection:'column',gap:2,maxHeight:'88vh',overflowY:'auto',paddingRight:4,width:168,animation:'fadeIn 1s ease .5s both'}},

      // KM/MI toggle
      h('div',{onClick:()=>setMetric(!metric),style:{display:'flex',marginBottom:4,background:'rgba(0,0,0,.75)',borderRadius:20,border:'1px solid rgba(255,255,255,.10)',overflow:'hidden',cursor:'pointer',alignSelf:'center'}},
        ['KM','MI'].map(u=>h('div',{key:u,style:{padding:'3px 12px',fontSize:9,fontFamily:"'Cinzel',serif",fontWeight:700,color:(u==='KM')===metric?'white':'rgba(255,255,255,.28)',background:(u==='KM')===metric?'rgba(100,140,255,.25)':'transparent',transition:'all .2s'}},u))),

      // ── PLANETS ──
      h('div',{style:{color:'rgba(255,255,255,.22)',fontSize:7.5,letterSpacing:2,fontFamily:"'Cinzel',serif",padding:'2px 4px',marginBottom:1}},'PLANETS'),
      PD.map(p=>{
        const isExp=expP===p.id,isSel=sel&&sel.id===p.id;
        return h('div',{key:p.id},
          h('div',{style:{display:'flex',alignItems:'center'}},
            h('button',{onClick:()=>{handleBodySel(p);if(!(p.moonList||p.moonData).length)return;if(!isExp)setExpP(p.id);},
              style:{flex:1,display:'flex',alignItems:'center',gap:7,padding:'5px 9px',
                borderRadius:(p.moonList||p.moonData).length?'18px 0 0 18px':18,
                cursor:'pointer',fontSize:11,fontFamily:"'Cinzel',serif",
                background:isSel?p.color+'28':'rgba(0,0,0,.55)',
                border:isSel?'1px solid '+p.color+'70':'1px solid rgba(255,255,255,.06)',
                borderRight:(p.moonList||p.moonData).length?'none':undefined,
                color:isSel?p.glow:'rgba(255,255,255,.55)',
                backdropFilter:'blur(12px)',transition:'all .2s'}},
              h('div',{style:{width:8,height:8,borderRadius:'50%',background:p.color,flexShrink:0}}),
              h('span',{style:{flex:1,textAlign:'left'}},p.name),
              h('span',{style:{fontSize:8,color:p.color+'70'}},p.sym)),
            p.moonData.length>0&&h('button',{onClick:()=>setExpP(isExp?null:p.id),
              style:{padding:'5px 7px',borderRadius:'0 18px 18px 0',background:isSel?p.color+'28':'rgba(0,0,0,.55)',border:isSel?'1px solid '+p.color+'70':'1px solid rgba(255,255,255,.06)',borderLeft:'1px solid rgba(255,255,255,.08)',color:'rgba(255,255,255,.35)',fontSize:9,cursor:'pointer',backdropFilter:'blur(12px)'}},isExp?'▲':'▼')),
          isExp&&p.moonData.length>0&&h('div',{style:{marginLeft:16,marginTop:2,display:'flex',flexDirection:'column',gap:2,borderLeft:'2px solid '+p.color+'25',paddingLeft:8}},
            (p.moonList||p.moonData).map(m=>{
              const is3d=p.moonData.some(md=>md.name===m.name);
              const mSel=sel&&sel.name===m.name;
              const mc=m.color||p.color;
              return h('button',{key:m.name,
                onClick:()=>is3d?handleBodySel({...p.moonData.find(md=>md.name===m.name),isMoon:true,parentPlanet:p.name}):handleBodySel({...m,isMoon:true,parentPlanet:p.name,color:p.color,glow:p.glow,type:'Moon'}),
                style:{display:'flex',alignItems:'center',gap:5,padding:'3px 9px',borderRadius:14,cursor:'pointer',fontSize:10,fontFamily:"'Cinzel',serif",background:mSel?mc+'22':'rgba(0,0,0,.45)',border:mSel?'1px solid '+mc+'55':'1px solid rgba(255,255,255,.04)',color:mSel?mc:'rgba(255,255,255,.38)',backdropFilter:'blur(8px)',transition:'all .2s',opacity:is3d?1:.7}},
                h('div',{style:{width:5,height:5,borderRadius:'50%',background:is3d?mc:mc+'55',flexShrink:0,boxShadow:is3d?'0 0 4px '+mc:'none'}}),
                m.name,
                is3d&&h('span',{style:{fontSize:7,color:mc,marginLeft:'auto',opacity:.6}},'3D'),
                m.water&&m.water.includes('CONFIRMED')&&h('span',{style:{fontSize:8,color:'#66aaff',marginLeft:'auto'}},'💧'))})));
      }),

      h('div',{style:{height:1,background:'rgba(255,255,255,.06)',margin:'4px 0'}}),

      // ── SPACE TELESCOPES ──
      SectionHdr('TELESCOPES','telescopes','🔭','#aa88ff'),
      expSection.telescopes&&TELESCOPES.map(t=>MiniBtn(t.name,t.color,()=>openTelescope(t),selTelescope&&selTelescope.id===t.id,t.status.includes('Active')?'active':'done','🔭')),

      h('div',{style:{height:1,background:'rgba(255,255,255,.06)',margin:'4px 0'}}),

      // ── SPACECRAFT ──
      SectionHdr('SPACECRAFT','spacecraft',null,'rgba(255,255,255,.22)'),
      expSection.spacecraft&&h(Fragment,null,
        PROBES.filter(p=>p.status.includes('Active')).map(pr=>h('button',{key:pr.id,
          onClick:()=>handleBodySel({...pr,moonData:[],isMission:true}),
          style:{display:'flex',alignItems:'center',gap:7,padding:'5px 9px',borderRadius:18,cursor:'pointer',fontSize:10,fontFamily:"'Cinzel',serif",background:'rgba(0,30,15,.6)',border:'1px solid rgba(0,200,100,.12)',color:pr.color,backdropFilter:'blur(12px)',marginBottom:2,width:'100%'}},
          h('div',{style:{width:6,height:6,borderRadius:'50%',background:pr.color,flexShrink:0}}),
          h('span',{style:{flex:1,textAlign:'left'}},pr.name),
          h('span',{style:{fontSize:7,color:'#33ee77'}},'●'))),
        PROBES.filter(p=>!p.status.includes('Active')).map(pr=>h('button',{key:pr.id,
          onClick:()=>handleBodySel({...pr,moonData:[],isMission:true}),
          style:{display:'flex',alignItems:'center',gap:7,padding:'5px 9px',borderRadius:18,cursor:'pointer',fontSize:10,fontFamily:"'Cinzel',serif",background:'rgba(0,0,0,.50)',border:'1px solid rgba(255,255,255,.05)',color:pr.color+'99',backdropFilter:'blur(12px)',marginBottom:2,width:'100%'}},
          h('div',{style:{width:6,height:6,borderRadius:'50%',background:pr.color,opacity:.55,flexShrink:0}}),
          h('span',{style:{flex:1,textAlign:'left'}},pr.name),
          h('span',{style:{fontSize:7,color:'rgba(255,255,255,.25)'}},'✓')))),

      h('div',{style:{height:1,background:'rgba(255,255,255,.06)',margin:'4px 0'}}),

      // ── MARS ──
      SectionHdr('MARS MISSIONS','mars','🔴','#ff7744'),
      expSection.mars&&h(Fragment,null,
        h('div',{style:{color:'rgba(255,120,80,.45)',fontSize:7,letterSpacing:2,fontFamily:"'Cinzel',serif",padding:'1px 6px',marginBottom:2}},'ORBITERS'),
        MARS_MISSIONS.filter(m=>m.category==='orbiter').map(m=>MiniBtn(m.name,m.color,()=>openMars(m),selMars&&selMars.id===m.id,m.status.includes('Active')?'active':'done','🛰️')),
        h('div',{style:{color:'rgba(255,120,80,.45)',fontSize:7,letterSpacing:2,fontFamily:"'Cinzel',serif",padding:'1px 6px',marginTop:4,marginBottom:2}},'ROVERS & LANDERS'),
        MARS_MISSIONS.filter(m=>m.category==='lander').map(m=>MiniBtn(m.name,m.color,()=>openMars(m),selMars&&selMars.id===m.id,m.status.includes('Active')?'active':m.status.includes('Completed')?'done':'done','🤖'))),

      h('div',{style:{height:1,background:'rgba(255,255,255,.06)',margin:'4px 0'}}),

      // ── MOON LANDERS ──
      SectionHdr('MOON LANDERS','moon','🌙','#c8c0a8'),
      expSection.moon&&MOON_LANDERS.map(m=>MiniBtn(m.name,m.color,()=>openMoon(m),selMoon&&selMoon.id===m.id,m.status==='Active'?'active':'done',m.country?m.country.slice(-2):'🌙')),

      h('div',{style:{height:1,background:'rgba(255,255,255,.06)',margin:'4px 0'}}),

      // ── SPECIAL OBJECTS ──
      h('div',{style:{color:'rgba(255,255,255,.22)',fontSize:7.5,letterSpacing:2,fontFamily:"'Cinzel',serif",padding:'2px 4px',marginBottom:1}},'SPECIAL OBJECTS'),
      SPECIALS.map(sp=>h('button',{key:sp.id,onClick:()=>handleBodySel({...sp,moonData:[]}),
        style:{display:'flex',alignItems:'center',gap:7,padding:'5px 9px',borderRadius:18,cursor:'pointer',fontSize:10,fontFamily:"'Cinzel',serif",background:'rgba(0,0,0,.50)',border:'1px solid '+(sp.color+'18'),color:sp.color,backdropFilter:'blur(12px)',marginBottom:2,width:'100%'}},
        h('div',{style:{width:7,height:7,borderRadius:sp.id==='sedna'?'50%':'1px',background:sp.color,flexShrink:0,transform:sp.id!=='sedna'?'rotate(45deg)':'none'}}),sp.name))),

    // ── RIGHT SIDEBAR — Distance Button ─────────────────────────────────────
    h('div',{style:{position:'fixed',right:14,bottom:80,zIndex:100,animation:'fadeIn 1s ease .5s both'}},
      h('button',{onClick:openDist,
        style:{display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'10px 14px',borderRadius:16,cursor:'pointer',
          background:showDist?'rgba(80,140,255,.20)':'rgba(0,0,0,.70)',
          border:showDist?'1px solid rgba(100,160,255,.50)':'1px solid rgba(255,255,255,.12)',
          color:showDist?'#88aaff':'rgba(255,255,255,.50)',
          backdropFilter:'blur(14px)',transition:'all .2s'}},
        h('span',{style:{fontSize:20}},'📏'),
        h('div',{style:{fontSize:7.5,fontFamily:"'Cinzel',serif",letterSpacing:1.5,textAlign:'center',lineHeight:1.3}},'DISTANCES',h('br'),'FROM SUN'))),

    // Bottom hint
    h('div',{style:{position:'fixed',bottom:18,left:'50%',transform:'translateX(-50%)',zIndex:100,background:'rgba(0,0,0,.55)',backdropFilter:'blur(14px)',border:'1px solid rgba(255,255,255,.08)',borderRadius:30,padding:'7px 20px',color:'rgba(255,255,255,.38)',fontSize:10,letterSpacing:2,fontFamily:"'Cinzel',serif",textAlign:'center',animation:'fadeIn 2s ease 1s both',pointerEvents:'none',whiteSpace:'nowrap'}},
      'DRAG · SCROLL TO ZOOM — PLANETS → OORT CLOUD → MILKY WAY'),

    // ── PANELS ──────────────────────────────────────────────────────────────
    h(BodyPanel,{body:sel,onClose:()=>setSel(null),metric,setMetric}),
    selTelescope&&h(TelescopePanel,{scope:selTelescope,onClose:()=>setSelTelescope(null)}),
    selMars&&h(MissionDetailPanel,{mission:selMars,onClose:()=>setSelMars(null),planetColor:'#ff7744'}),
    selMoon&&h(MissionDetailPanel,{mission:selMoon,onClose:()=>setSelMoon(null),planetColor:'#c8c0a8'}),
    showDist&&h(DistancePanel,{metric:distMetric,setMetric:setDistMetric,onClose:()=>setShowDist(false)}));
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
